name: Release

on:
  push:
    branches: [main]
    paths:
      - 'Directory.Build.props'

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      should_release: ${{ steps.check_tag.outputs.should_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract UIVersion from Directory.Build.props
        id: extract
        shell: bash
        run: |
          version=$(grep -oP '(?<=<UIVersion>)[^<]+' Directory.Build.props)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Detected UIVersion: $version"

      - name: Check if tag already exists
        id: check_tag
        shell: bash
        run: |
          if git rev-parse "v${{ steps.extract.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.extract.outputs.version }} already exists — skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag v${{ steps.extract.outputs.version }} does not exist — will release"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      fail-fast: true
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            artifact: PKHeX-Avalonia-win-x64
          - rid: linux-x64
            os: ubuntu-latest
            artifact: PKHeX-Avalonia-linux-x64
          - rid: osx-arm64
            os: macos-latest
            artifact: PKHeX-Avalonia-osx-arm64
          - rid: osx-x64
            os: macos-latest
            artifact: PKHeX-Avalonia-osx-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Publish
        run: >
          dotnet publish PKHeX.Avalonia/PKHeX.Avalonia.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -p:PublishSingleFile=true
          -p:UIVersion=${{ needs.check-version.outputs.version }}
          -o publish

      # macOS: zip the .app bundle
      - name: Package (macOS)
        if: startsWith(matrix.rid, 'osx')
        shell: bash
        run: |
          cd publish
          zip -r ../${{ matrix.artifact }}.zip PKHeX.Avalonia.app
          cd ..

      # Linux: make executable and zip
      - name: Package (Linux)
        if: matrix.rid == 'linux-x64'
        shell: bash
        run: |
          chmod +x publish/PKHeX.Avalonia
          cd publish
          zip -r ../${{ matrix.artifact }}.zip .
          cd ..

      # Windows: zip the publish folder
      - name: Package (Windows)
        if: matrix.rid == 'win-x64'
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip
          retention-days: 5

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ needs.check-version.outputs.version }}"
          git push origin "v${{ needs.check-version.outputs.version }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: PKHeX Avalonia v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: artifacts/**/*.zip
          draft: false
          prerelease: false
